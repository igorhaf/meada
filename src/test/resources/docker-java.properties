# Força a API Docker que a docker-java negocia, contornando o bug conhecido do
# Testcontainers 1.x com Docker 29+.
#
# Docker 29.0.0 elevou a API mínima de 1.24 para 1.44 (testcontainers-java
# issue #11210). O Testcontainers 1.x usa docker-java cujo default é 1.32, que
# o daemon 29+ RECUSA com "client version 1.32 is too old". A docker-java lê
# este arquivo (docker-java.properties no classpath) e usa api.version daqui,
# pulando a negociação quebrada.
#
# REMOVER quando o BOM do Spring Boot trouxer Testcontainers >= 2.x (ou uma 1.x
# que negocie API moderna nativamente). Ver DEVELOPMENT.md.
api.version=1.44
