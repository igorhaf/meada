# docker-compose do meadadigital — SÓ os serviços do próprio meada.
#
# O meada deixou de ser monólito: cada projeto (muda, germinar, pindorama, conexao,
# soar, semente) tem o SEU docker-compose no próprio repo, e o INGRESS (Caddy) + a
# infra (rede `meada`, MinIO/Postgres de dev) vivem no `shared`. Não há mais
# external_projects. Todos os composes compartilham a rede externa `meada`.
#
# Aqui ficam: backend (Spring), frontend (Next), embeddings (sidecar) e o ambiente demo.
#   Banco: Supabase remoto (via .env). Rede: `meada` (externa). Ingress: Caddy do shared.
#
# DEV: docker-compose.override.yml troca os targets para `dev` (hot-reload).
services:
  backend:
    # PROD: target `runtime` (JRE + jar). DEV: override troca pra `dev` (JDK+Maven, hot-reload).
    build:
      context: .
      target: runtime
    container_name: meada-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - KNOWLEDGE_EMBEDDING_ENDPOINT=http://embeddings:7080
    ports:
      - "8095:8095"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [meada]

  frontend:
    # PROD: target `prod` (Next standalone). As NEXT_PUBLIC_* são inlinadas no build.
    build:
      context: ./frontend
      target: prod
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: meada-frontend
    restart: unless-stopped
    environment:
      - CMS_BACKEND_URL=http://backend:8095
    ports:
      - "3000:3000"
    networks: [meada]
    depends_on: [backend]

  # ---------------------------------------------------------------------------
  # AMBIENTE DEMO — MESMO código do prod, Supabase SEPARADO. Só sobe com `--profile demo`.
  # Acessível via Caddy (demo./api-demo.). DEMO_* vêm do .env do servidor (segredos).
  # ---------------------------------------------------------------------------
  demo-backend:
    profiles: [demo]
    build:
      context: .
      target: runtime
    container_name: demo-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - KNOWLEDGE_EMBEDDING_ENDPOINT=http://embeddings:7080
      - SPRING_DATASOURCE_URL=${DEMO_SPRING_DATASOURCE_URL:-}
      - SPRING_DATASOURCE_USERNAME=${DEMO_SPRING_DATASOURCE_USERNAME:-}
      - SPRING_DATASOURCE_PASSWORD=${DEMO_SPRING_DATASOURCE_PASSWORD:-}
      - SUPABASE_URL=${DEMO_SUPABASE_URL:-}
      - SUPABASE_JWKS_URL=${DEMO_SUPABASE_JWKS_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${DEMO_SUPABASE_SERVICE_ROLE_KEY:-}
      - ADMIN_CORS_ALLOWED_ORIGINS=https://demo.meadadigital.com
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [meada]

  demo-frontend:
    profiles: [demo]
    build:
      context: ./frontend
      target: prod
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${DEMO_NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${DEMO_NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_API_URL: ${DEMO_NEXT_PUBLIC_API_URL:-}
    container_name: demo-frontend
    restart: unless-stopped
    environment:
      - CMS_BACKEND_URL=http://demo-backend:8095
    networks: [meada]
    depends_on: [demo-backend]

  embeddings:
    build:
      # Sidecar de embeddings — código no repo shared (~/shared/python), ao lado deste.
      context: ../shared/python
    container_name: meada-embeddings
    restart: unless-stopped
    ports:
      - "7080:7080"
    volumes:
      - embedding-models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks: [meada]

networks:
  # Rede externa compartilhada do ecossistema (criada pelo shared / `docker network create meada`).
  meada:
    external: true
    name: meada

volumes:
  # Cache dos modelos HuggingFace — nome fixo meada_* para reusar o volume de produção.
  embedding-models:
    name: meada_embedding-models
